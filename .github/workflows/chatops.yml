name: ChatOps-Wesnei

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  deploy-controlado:
    if: >
      contains(github.event.comment.body, '/deploy') && 
      github.actor == 'Wesnei'
    runs-on: ubuntu-latest

    steps:
      - name: Feedback Inicial
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Deploy autorizado por Wesnei.** Iniciando o processo de entrega...'
            })

      - name: Simulação de Deploy
        run: |
          echo "Rodando scripts de deploy..."
          # Aqui entraria o seu comando real de produção
          sleep 5

      - name: Feedback Final
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Produção atualizada com sucesso!** \n\n*Executado por: @Wesnei*'
            })