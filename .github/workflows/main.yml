name: CI/CD Pipeline Basico

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integracao_e_testes:
    runs-on: ubuntu-latest

    steps:
    - name: Fazer o checkout do código
      uses: actions/checkout@v4

    - name: Instalar e configurar o PostgreSQL nativo
      run: |
        sudo systemctl start postgresql
        sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'root';"
        sudo -u postgres psql -c "CREATE DATABASE \"express-crud\";"

    # Mapeia as variáveis para o seu .env interno encontrar o banco do GitHub
    - name: Configurar o arquivo .env de teste
      run: |
        echo "DB_HOST=localhost" >> .env
        echo "DB_PORT=5432" >> .env
        echo "DB_USER=postgres" >> .env
        echo "DB_PASSWORD=root" >> .env
        echo "DB_NAME=express-crud" >> .env
        echo "NODE_ENV=test" >> .env

    - name: Configurar o Node.js (Versão 20)
      uses: actions/setup-node@v4
      with:
        node-version: '20' 

    - name: Instalar as dependências (npm install)
      run: npm install

    - name: Run tests
      run: npm test