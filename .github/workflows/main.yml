name: CI/CD Pipeline Basico

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integracao_e_testes:
    runs-on: ubuntu-latest

    steps:
    - name: Fazer o checkout do código
      uses: actions/checkout@v4

    - name: Instalar e configurar o PostgreSQL nativo
      run: |
        sudo systemctl start postgresql
        sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'root';"
        sudo -u postgres psql -c "CREATE DATABASE \"express-crud\";"

    # Mapeia as variáveis para o seu .env interno encontrar o banco do GitHub
    - name: 🔐 Configurar o arquivo .env de teste (Via Super-Secret JSON)
      run: |
        echo "DB_HOST=$(echo '${{ secrets.DB_SECRETS }}' | jq -r '.DB_HOST')" >> .env
        echo "DB_PORT=$(echo '${{ secrets.DB_SECRETS }}' | jq -r '.DB_PORT')" >> .env
        echo "DB_USER=$(echo '${{ secrets.DB_SECRETS }}' | jq -r '.DB_USER')" >> .env
        echo "DB_PASSWORD=$(echo '${{ secrets.DB_SECRETS }}' | jq -r '.DB_PASSWORD')" >> .env
        echo "DB_NAME=$(echo '${{ secrets.DB_SECRETS }}' | jq -r '.DB_NAME')" >> .env
        echo "NODE_ENV=test" >> .env

    - name: Configurar o Node.js (Versão 20)
      uses: actions/setup-node@v4
      with:
        node-version: '20' 

    - name: Instalar as dependências (npm install)
      run: npm install

    - name: Run tests
      run: npm test